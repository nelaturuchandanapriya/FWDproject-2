<!DOCTYPE html>
<html>
<head>
	<title>Chandana's Boutique</title>
	<style>
		body {
			font-family: 'Playfair Display', serif;
			background-color: #FFF1F4; 
			margin: 0;
			padding: 0;
		}
		.container {
			width: 80%;
			margin: 40px auto;
			padding: 20px;
			background-color: #FFFFFF;
			border: 1px solid #C2185B; 
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0,0,0,0.1);
		}
		h1 {
			color: #C2185B; 
            font-size: 36px;
			text-align: center;
		}
		table {
			width: 100%;
			border-collapse: collapse;
			margin-top: 20px;
		}
		th, td {
			border: 1px solid #C2185B;
			padding: 10px;
			text-align: left;
		}
		th {
			background-color: #C2185B;
			color: #FFFFFF;
		}
		nav ul {
			list-style: none;
			padding: 0;
			margin-top: 20px;
			text-align: center;
		}
		nav li {
			display: inline-block;
			margin: 0 20px;
		}
		nav a {
			text-decoration: none;
			color: #C2185B;
			font-size: 18px;
			font-weight: bold;
		}
		nav a:hover {
			text-decoration: underline;
		}
	</style>
</head>

<body>
	<div class="container">
		<h1>Chandana's Boutique</h1>

		<table>
			<tr>
				<th>Feature</th>
				<th>Details</th>
			</tr>
			<tr>
				<td>Specialization</td>
				<td>Custom Dress Designing</td>
			</tr>
			<tr>
				<td>Location</td>
				<td>India</td>
			</tr>
			<tr>
				<td>Working Hours</td>
				<td>10am - 7pm</td>
			</tr>
		</table>

		<nav>
			<ul>
				<li><a href="Designs.html">Our designs</a></li>
				<li><a href="Services.html">Our Services</a></li>
			</ul>
		</nav>
	</div>
</body>
</html>
