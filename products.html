<!DOCTYPE html>
<html lang="en">
<head>
    <title>Our Products</title>

    <style>
        
        body{
            background-color: rgba(255, 217, 0, 0.244);
            font-family: Arial;
            margin: 0;
            text-align: center;
        }

      
        h1{
            color: brown;
            margin-top: 40px;
            font-size: 38px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        
        table{
            width: 45%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: rgba(255,255,255,0.9);
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }

        table, th, td{
            border: 5px solid black; /* thick border */
            padding: 14px;
        }

        th{
            background-color: rgba(255, 192, 212, 0.9);
            font-size: 22px;
            color: brown;
        }

        td{
            font-size: 18px;
        }

       
        tr:hover{
            background-color: rgba(255, 192, 212, 0.4);
        }

       
        .offer{
            background-color: rgba(255, 192, 212, 0.774);
            padding: 15px;
            margin-top: 70px;
        }

        marquee{
            font-size: 32px;
            font-style: oblique;
            color: brown;
            letter-spacing: 2px;
        }

       
        a{
            text-decoration: none;
        }

        a h1{
            display: inline-block;
            margin: 40px 0;
            padding: 10px 35px;
            color: brown;
            border: 3px solid brown;
            border-radius: 25px;
            font-size: 26px;
        }

        a h1:hover{
            background-color: rgba(255, 192, 212, 0.6);
        }
    </style>

</head>
<body>

    <h1>Our Products</h1>

   
    <table>
        <tr>
            <th>Item</th>
            <th>Category</th>
        </tr>
        <tr>

        </tr>
        <tr>
            <td>Handbags</td>
            <td>Accessories</td>
        </tr>
        <tr>
            <td>Designer Dresses</td>
            <td>Clothing</td>
        </tr>
        <tr>
            <td>Sandals, Flats, Heels</td>
            <td>Footwear</td>
        </tr>
    </table>

    
    <div class="offer">
        <marquee> New Arrivals | Designer Dresses | Trendy Accessories </marquee>
    </div>

    
    <a href="Home.html">
        <h1>Back To Home</h1>
    </a>

</body>
</html>
