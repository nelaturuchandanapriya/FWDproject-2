<!DOCTYPE html>
<html>
<head>
    <title>Our Services</title>
    <style>
        body{
            background-color:#FDEFF4;
            font-family: "Segoe UI", Arial;
            color:#3A2A4D;
            text-align:center;
        }

        h1{
            color:#7B3FA1;
            letter-spacing:2px;
        }

        h2{
            color:#E91E63;
        }

        .box{
            width:65%;
            margin:30px auto;
            background-color:#FFF7FC;
            padding:25px;
            border-radius:25px;
            border:3px solid #7B3FA1;
            box-shadow: 0 0 15px #E91E63;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table, th, td{
            border:3px solid #7B3FA1;
            padding:12px;
        }

        th{
            background-color:#F8C8DC;
        }

        select, input, textarea{
            width:65%;
            padding:8px;
            border-radius:10px;
            border:2px solid #7B3FA1;
        }

        input[type=submit]{
            background-color:#E91E63;
            color:white;
            border:none;
            padding:12px 30px;
            border-radius:20px;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>
<body>

<h1>✨ Enchanted Online Services ✨</h1>
<p>Because every girl deserves to feel like a princess</p>

<div class="box">
<h2> Services</h2>
<table>
    <tr>
        <th>Service</th>
        <th>Description</th>
    </tr>
    <tr>
        <td>Custom Stitching</td>
        <td>Perfectly fitted outfits</td>
    </tr>
    <tr>
        <td>Virtual Styling</td>
        <td>Online  fashion guidance</td>
    </tr>
    <tr>
        <td>Footwear Styling</td>
        <td>Flats, sandals & heels</td>
    </tr>
</table>
</div>

<div class="box">
<h2>Book Your  Service</h2>

<form action="end.html">
    <input type="text" placeholder=" Name" required><br><br>
    <input type="email" placeholder="Email" required><br><br>

    <select required>
        <option value="">Choose Your Service</option>
        <option>Custom Stitching</option>
        <option>Virtual Styling</option>
        <option>Footwear Styling</option>
    </select><br><br>

    <textarea placeholder=" Address"></textarea><br><br>

    <input type="submit" value="✨ Book Now ✨">
</form>
</div>

</body>
</html>
